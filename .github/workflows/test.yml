name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"] # test without "3.14" locally, numpy,pandas wheels mssing
        resolution: ["locked"]
        include:
          - python-version: "3.14"
            resolution: "latest"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies (locked)
        if: matrix.resolution == 'locked'
        run: uv sync

      - name: Install dependencies (latest)
        if: matrix.resolution == 'latest'
        run: uv sync --resolution=latest
        continue-on-error: true

      - name: Check formatting (Ruff)
        run: uv run ruff format --check .

      - name: Lint (Ruff)
        run: uv run ruff check --output-format=github .

      - name: Type check (Pyright)
        run: uv run pyright src/

      - name: Pytest with coverage
        run: uv run pytest --cov=src/heliotrace --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Job Summary
        if: matrix.python-version == '3.12' && matrix.resolution == 'locked'
        run: uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Docker Build
        run: docker compose build
