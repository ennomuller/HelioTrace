repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6 # run `pre-commit autoupdate` to bump
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv.lock sync check
        language: system
        entry: uv lock --check
        pass_filenames: false
        stages: [pre-push]
        files: ^(pyproject\.toml|uv\.lock)$

      - id: pyright
        name: pyright type check
        language: system
        entry: uv run pyright src/
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        language: system
        entry: uv run pytest
        pass_filenames: false
        stages: [pre-push]